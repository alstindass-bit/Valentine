<!DOCTYPE html>
<html>
<head>
  <title>Animated Countdown Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .game-container {
      background: rgba(0,0,0,0.5);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      width: 350px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .circle {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 20px auto;
    }

    svg {
      transform: rotate(-90deg);
    }

    circle {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
    }

    .bg {
      stroke: #555;
    }

    .progress {
      stroke: #00ffcc;
      stroke-dasharray: 440;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .time-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 30px;
    }

    .score, .target {
      margin: 10px 0;
      font-size: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      background: #00ffcc;
      color: #000;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px #00ffcc;
    }

    .popup {
      margin-top: 15px;
      font-size: 22px;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

  </style>
</head>
<body>

<div class="game-container">
  <h1>⏳ Animated Game</h1>

  <div class="circle">
    <svg width="150" height="150">
      <circle class="bg" cx="75" cy="75" r="70"></circle>
      <circle class="progress" cx="75" cy="75" r="70"></circle>
    </svg>
    <div class="time-text" id="time">30</div>
  </div>

  <div class="target" id="target"></div>
  <div class="score" id="score">Score: 0</div>

  <button onclick="increaseScore()">+1 Point</button>
  <button onclick="restartGame()">Restart</button>

  <div id="message"></div>
</div>

<script>
  const totalTime = 30;
  const radius = 70;
  const circumference = 2 * Math.PI * radius;

  const progressCircle = document.querySelector(".progress");
  progressCircle.style.strokeDasharray = circumference;

  let timeLeft = totalTime;
  let score = 0;
  let target = Math.floor(Math.random() * 15) + 10;
  let timer;

  document.getElementById("target").textContent = "Target: " + target;

  function updateCircle() {
    const offset = circumference - (timeLeft / totalTime) * circumference;
    progressCircle.style.strokeDashoffset = offset;
  }

  function startTimer() {
    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("time").textContent = timeLeft;
      updateCircle();

      if (timeLeft <= 0) {
        clearInterval(timer);
        endGame();
      }
    }, 1000);
  }

  function increaseScore() {
    if (timeLeft > 0) {
      score++;
      document.getElementById("score").textContent = "Score: " + score;

      if (score >= target) {
        clearInterval(timer);
        showMessage("🎉 You Win!");
      }
    }
  }

  function endGame() {
    if (score < target) {
      showMessage("⏰ Time's Up! You Lose!");
    }
  }

  function showMessage(text) {
    const msg = document.getElementById("message");
    msg.innerHTML = "<div class='popup'>" + text + "</div>";
  }

  function restartGame() {
    clearInterval(timer);
    timeLeft = totalTime;
    score = 0;
    target = Math.floor(Math.random() * 15) + 10;

    document.getElementById("time").textContent = timeLeft;
    document.getElementById("score").textContent = "Score: 0";
    document.getElementById("target").textContent = "Target: " + target;
    document.getElementById("message").innerHTML = "";

    updateCircle();
    startTimer();
  }

  updateCircle();
  startTimer();
</script>

</body>
</html>
